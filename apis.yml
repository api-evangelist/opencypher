aid: opencypher
name: openCypher
description: >-
  openCypher is an open-source project that provides a standardized graph query
  language originally developed by Neo4j for querying property graphs. It enables
  developers to write expressive pattern-matching queries against graph databases,
  and its specification has been adopted by multiple graph database vendors.
